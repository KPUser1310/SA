variables:
  BUILD_CONFIGURATION: "Release"
 
stages:
  - build
  - deploy
 
# ---------------------------------
# BUILD STAGE
# ---------------------------------
build_solution:
  stage: build
  tags:
    - windows
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - dotnet restore SmartAttend.sln
    - dotnet build SmartAttend.sln -c $env:BUILD_CONFIGURATION --no-restore
 
    # Publish AppGateway
    - dotnet publish AppGateway/AppGateway.csproj -c $env:BUILD_CONFIGURATION -o publish/AppGateway
 
    # Publish Admin project into Admin folder
    - dotnet publish SmartAttend.Api/SmartAttend.Admin.csproj -c $env:BUILD_CONFIGURATION -o publish/AppGateway/admin
 
  artifacts:
    paths:
      - publish/AppGateway/
    expire_in: 1 day
 
 
